  <title>Director Tin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #18324b;
      min-height: 100vh;
      font-family: "Lora", serif;
      color: #ffffff;
      overflow-x: hidden;
    }

    .page-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 64px;
    }

    .logo-container {
      width: 100%;
      max-width: 520px;
      opacity: 0;
      transform: translateY(-18px);
      animation: fadeDown 0.8s ease forwards;
    }

    .logo-container img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    .caption {
      margin-top: 20px;
      font-family: "Lora", serif;
      font-weight: 400;
      font-size: 1.05rem;
      letter-spacing: 0.01em;
      color: #ffffff;
      text-align: center;
      width: 100%;
      max-width: 1100px;
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.35s forwards;
    }

    .widget-scroll-wrapper {
      margin-top: 28px;
      width: 100%;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.55s forwards;
    }

    .widget-container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    @keyframes fadeDown {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
